<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get("session_id");

const endpoint =
"https://mtchkmgfwnhbsasaoslo.supabase.co/functions/v1/get-pin";

let tries = 0;
const maxTries = 60;

const content = document.getElementById("content");

async function loadPin() {

  console.log("Checking PIN... Attempt", tries + 1);

  try {

    const controller = new AbortController();

    const timeout = setTimeout(() => {
      controller.abort();
    }, 5000);

    const res = await fetch(
      `${endpoint}?session_id=${encodeURIComponent(sessionId)}`,
      {
        method: "GET",
        cache: "no-store",
        signal: controller.signal
      }
    );

    clearTimeout(timeout);

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();

    console.log("Response:", data);

    // ==========================
    // PIN FOUND
    // ==========================

    if (data.pin) {

      console.log("PIN FOUND:", data.pin);

      content.innerHTML = `
        <div class="check-icon">✓</div>

        <h1>Payment Successful!</h1>

        <div class="subtitle">
          Thank you for your purchase.<br>
          Your PIN is ready.
        </div>

        <div class="pin-title">
          Your PIN
        </div>

        <div class="pin-box">
          ${data.pin}
        </div>

        <div class="buttons">

          <button class="copy-btn" id="copyBtn">
            📋 Copy PIN
          </button>

          <button class="print-btn"
                  onclick="window.print()">
            🖨 Print
          </button>

        </div>

        <div class="copy-message" id="copyMessage">
          ✅ PIN copied to clipboard!
        </div>

        <div class="notice">
          🛡️ Please save this PIN for your records.<br>
          You will need it for activation.
        </div>
      `;

      document.getElementById("copyBtn")
      .addEventListener("click", async () => {

        try {

          await navigator.clipboard.writeText(data.pin);

          document.getElementById("copyMessage")
          .style.display = "block";

        } catch {

          alert("Unable to copy PIN. Please copy it manually.");

        }

      });

      return;

    }

    // ==========================
    // PIN PENDING
    // ==========================

    if (data.status === "pending") {

      tries++;

      console.log(`PIN pending (${tries}/${maxTries})`);

      if (tries < maxTries) {

        document.querySelector(".subtitle").innerHTML =
          `Payment received.<br>
           Activating your Internet access...<br>
           Checking PIN (${tries}/${maxTries})`;

        setTimeout(loadPin, 1000);

        return;
      }

    }

    // ==========================
    // TIMEOUT
    // ==========================

    content.innerHTML = `
      <h1>PIN Not Ready</h1>

      <div class="subtitle">
        Your payment was successful.<br>
        The PIN is taking longer than expected.<br><br>
        Please refresh this page in a few moments.
      </div>

      <br>

      <button class="copy-btn"
              onclick="location.reload()">
        Refresh Page
      </button>
    `;

  }
  catch(err) {

    console.error("Fetch error:", err);

    tries++;

    if (tries < maxTries) {

      document.querySelector(".subtitle").innerHTML =
        `Payment received.<br>
         Waiting for Internet connection...<br>
         Retrying (${tries}/${maxTries})`;

      setTimeout(loadPin, 1000);

      return;

    }

    content.innerHTML = `
      <h1>Connection Error</h1>

      <div class="subtitle">
        Unable to retrieve your PIN.<br>
        Please refresh the page.
      </div>

      <br>

      <button class="copy-btn"
              onclick="location.reload()">
        Refresh Page
      </button>
    `;

  }

}

// ==========================
// START
// ==========================

if (!sessionId) {

  content.innerHTML = `
    <h1>Missing Session ID</h1>

    <div class="subtitle">
      No session information was found.
    </div>
  `;

}
else {

  console.log("Session:", sessionId);

  // Give Stripe webhook 2 seconds to assign the PIN
  setTimeout(loadPin, 2000);

}
</script>
